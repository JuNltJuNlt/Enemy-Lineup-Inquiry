<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>深境螺旋阵容查询 · 母站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #ffffff;
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', '微软雅黑', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0 1.5rem 3rem;
    }

    .top-bar {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: flex-end;
      padding-top: 1rem;
    }

    .top-right-group {
      text-align: right;
    }

    .top-right-note {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-weight: 400;
      font-size: 0.9rem;
      color: #000000;
      line-height: 1.5;
    }

    .top-right-note a {
      color: #000000;
      text-decoration: underline;
    }

    .top-left-time {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-weight: 400;
      font-size: 0.9rem;
      color: #000000;
      line-height: 1.5;
      margin-top: 0.3rem;
    }

    .header-section {
      text-align: center;
      width: 100%;
      max-width: 800px;
      padding-top: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .main-title {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-weight: 700;
      font-size: 3.2rem;
      color: #000000;
      line-height: 1.3;
      margin-bottom: 0.5rem;
      letter-spacing: 0.04em;
    }

    .sub-credit {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-weight: 400;
      font-size: 1.25rem;
      color: #000000;
      line-height: 1.5;
    }

    .sub-credit a {
      color: #000000;
      text-decoration: underline;
    }

    .sub-credit a:hover {
      color: #555555;
    }

    .sub-text {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-weight: 400;
      font-size: 1.25rem;
      color: #000000;
      line-height: 1.5;
    }

    .categories-wrapper {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      margin-top: 0.5rem;
    }

    .category-section {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .category-title {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      color: #000000;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid #cccccc;
      text-align: center;
    }

    .subsite-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.8rem;
    }

    .subsite-card {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0.9rem 0.5rem;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      background-color: #fafafa;
      color: #333333;
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      text-decoration: none;
      transition: background-color 0.2s;
      word-break: break-word;
      min-height: 60px;
      cursor: pointer;
    }

    .subsite-card:hover {
      background-color: #f0f0f0;
      border-color: #aaaaaa;
    }

    @media (max-width: 550px) {
      .top-bar {
        justify-content: center;
      }

      .top-right-group {
        text-align: center;
      }

      .top-right-note {
        font-size: 0.8rem;
      }

      .top-left-time {
        font-size: 0.8rem;
      }

      .header-section {
        padding-top: 1.2rem;
      }

      .main-title {
        font-size: 2.3rem;
      }

      .sub-credit {
        font-size: 1.05rem;
      }

      .sub-text {
        font-size: 1.05rem;
      }

      .category-title {
        font-size: 1.1rem;
      }

      .subsite-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 0.7rem;
      }

      .subsite-card {
        font-size: 0.85rem;
        padding: 0.7rem 0.4rem;
        min-height: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="top-right-group">
      <div class="top-right-note">
        有需要怪物血量计算的可点这里：<a href="https://junltjunlt.github.io/HP-Calculator-JuNltJuNlt/" target="_blank" rel="noopener noreferrer">原/崩怪物血量计算工具 by くんりんてんか_q</a>
      </div>
      <div class="top-left-time" id="beijingTime"></div>
    </div>
  </div>

  <div class="header-section">
    <h1 class="main-title">深境螺旋阵容查询</h1>
    <p class="sub-credit">整理/制图：<a href="https://space.bilibili.com/630367190?spm_id_from=333.788.0.0" target="_blank" rel="noopener noreferrer">@くんりんてんか_q</a></p>
    <p class="sub-text">2026/7/11 17:39 加了个实时日期,<br>2026/7/11 17:35 加入了2.2、2.3、2.4、6.4四期深渊 此前已有1.0-1.1、2.0、2.1、3.7、6.5B、6.6、6.7七期/p>
  </div>

  <div class="categories-wrapper" id="categoriesContainer"></div>

  <script>
    (function() {
      const container = document.getElementById('categoriesContainer');
      if (!container) return;

      const categories = [
        {
          name: "蒙德-璃月",
          sites: ["1.0-1.1", "1.2", "1.3-1.4", "1.5", "1.6"]
        },
        {
          name: "稻妻",
          sites: ["2.0", "2.1", "2.2", "2.3", "2.4", "2.5", "2.6", "2.7", "2.8"]
        },
        {
          name: "须弥",
          sites: ["3.0", "3.1", "3.2", "3.3", "3.4", "3.5", "3.6", "3.7", "3.8"]
        },
        {
          name: "枫丹",
          sites: ["4.0", "4.1", "4.2", "4.3", "4.4", "4.5", "4.6", "4.7", "4.8"]
        },
        {
          name: "纳塔",
          sites: ["5.0", "5.1A", "5.1B", "5.2", "5.3", "5.4A", "5.4B", "5.5", "5.6A", "5.6B", "5.7", "5.8"]
        },
        {
          name: "空月之歌",
          sites: ["6.0A", "6.0B", "6.1", "6.2", "6.3A", "6.3B", "6.4", "6.5A", "6.5B", "6.6", "6.7"]
        }
      ];

      var htmlString = '';

      for (var i = 0; i < categories.length; i++) {
        var category = categories[i];
        htmlString += '<div class="category-section">';
        htmlString += '<div class="category-title">' + category.name + '</div>';
        htmlString += '<div class="subsite-grid">';

        for (var j = 0; j < category.sites.length; j++) {
          var siteName = category.sites[j];
          htmlString += '<a href="' + siteName + '.html" class="subsite-card">' + siteName + '</a>';
        }

        htmlString += '</div>';
        htmlString += '</div>';
      }

      container.innerHTML = htmlString;
    })();

    function updateBeijingTime() {
      var now = new Date();
      var options = { timeZone: 'Asia/Shanghai' };
      var beijingTime = now.toLocaleString('zh-CN', options);
      var parts = beijingTime.split(' ');
      var datePart = parts[0].replace(/\//g, '/');
      var timePart = parts[1];
      var formattedTime = datePart + ' ' + timePart;
      document.getElementById('beijingTime').textContent = formattedTime;
    }

    updateBeijingTime();
    setInterval(updateBeijingTime, 1000);
  </script>
</body>
</html>
